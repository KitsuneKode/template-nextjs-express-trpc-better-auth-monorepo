# Path B variant — API on Render only; bring your own Postgres + Redis URLs
# Dashboard → Blueprints → New Blueprint Instance → select this file
# Or create a manual Docker web service with the same env vars
# See docs/deployment-render.md (Variant B2)

services:
  - type: web
    name: arche-template-api
    runtime: docker
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RENDER
        value: 'true'
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENABLE_REDIS
        value: 'true'
      - key: FRONTEND_URL
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
