name: CI

on:
  push:
    branches: [main, prod, develop]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  NEXT_PUBLIC_SITE_NAME: Arche
  NEXT_PUBLIC_SITE_DESCRIPTION: Personal scaffold CLI and project vault

jobs:
  ci:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Turbo SCM base
        id: turbo-base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=$(git rev-parse HEAD^1)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Turbo verify mode
        id: turbo-mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/prod" ]; }; then
            echo "affected=" >> "$GITHUB_OUTPUT"
          else
            echo "affected=--affected" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/cache@v5
        id: turbo-cache
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('bun.lock', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint and typecheck
        env:
          TURBO_SCM_BASE: ${{ steps.turbo-base.outputs.base }}
        run: turbo run lint check-types ${{ steps.turbo-mode.outputs.affected }}

      - name: Tests
        run: bun test

      - name: Build
        env:
          TURBO_SCM_BASE: ${{ steps.turbo-base.outputs.base }}
        run: turbo run build ${{ steps.turbo-mode.outputs.affected }}

      - name: Smoke build web and CLI
        run: turbo run build --filter=@arche-template/web --filter=@arche/create

      - name: CLI package check
        run: bun run pkg:check

      - name: Repo doctor
        run: bun run repo:doctor:strict
