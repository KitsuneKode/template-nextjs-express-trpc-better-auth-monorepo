name: Verify generated (weekly)

on:
  schedule:
    # Mondays 07:00 UTC — after gitleaks weekly scan
    - cron: '0 7 * * 1'
  workflow_dispatch:

concurrency:
  group: verify-generated-weekly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-generated:
    name: Generated preset matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify generated project structure
        run: bun run verify:generated
