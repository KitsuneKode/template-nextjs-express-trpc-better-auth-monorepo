name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  NPM_TRUSTED_PUBLISHING_ENABLED: ${{ vars.NPM_TRUSTED_PUBLISHING_ENABLED }}
  NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  NEXT_PUBLIC_SITE_NAME: Arche
  NEXT_PUBLIC_SITE_DESCRIPTION: Personal scaffold CLI and project vault

jobs:
  release:
    name: Version PR / Publish
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run ci

      - name: Build
        run: bun run build

      - name: Package check
        run: bun run pkg:check

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version:packages
          publish: bun run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
