name: Secret scan

on:
  push:
    branches: [main, prod, develop]
  pull_request:
  schedule:
    # Mondays 06:00 UTC — full-repo history scan
    - cron: '0 6 * * 1'

concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets (redacted output)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
