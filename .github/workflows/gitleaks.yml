name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets (redacted output)
        run: gitleaks detect --source . --redact=100 --no-banner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
