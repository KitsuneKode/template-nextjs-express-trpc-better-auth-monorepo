# Render Blueprint — Arche monorepo API (apps/server)
# https://render.com/docs/blueprint-spec
#
# Recommended: Dashboard → Blueprints → New Blueprint Instance → this repo.
# Delete any old Native Bun web service that used `bun run apps/server/dist/server.js`.
# Web frontend stays on Vercel; set NEXT_PUBLIC_API_URL to the Render service URL.
#
# Native Bun alternative (manual service, not this blueprint block):
#   runtime: bun | root: . | build: bun install && bun run build --filter=@template/server
#   start: cd apps/server && HOST=0.0.0.0 bun run start
#   Do NOT set PORT in the dashboard — Render injects it. See docs/deployment-render.md.

services:
  - type: keyvalue
    name: arche-template-redis
    plan: free
    ipAllowList: []

  - type: web
    name: arche-template-api
    runtime: docker
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RENDER
        value: 'true'
      - key: DATABASE_URL
        fromDatabase:
          name: arche-template-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: arche-template-redis
          type: keyvalue
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true

databases:
  - name: arche-template-db
    plan: free
    databaseName: template
    user: template
