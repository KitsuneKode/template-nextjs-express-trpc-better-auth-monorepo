# Render Blueprint — API + Postgres + Redis (one-click)
# Dashboard → Blueprints → New Blueprint Instance → connect repo
# Web stays on Vercel (NEXT_PUBLIC_API_URL → arche-template-api URL)
# Manual Native Bun is supported but easy to misconfigure — see docs/deployment-render.md

services:
  - type: keyvalue
    name: arche-template-redis
    plan: free
    ipAllowList: []

  - type: web
    name: arche-template-api
    runtime: docker
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RENDER
        value: 'true'
      - key: DATABASE_URL
        fromDatabase:
          name: arche-template-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: arche-template-redis
          type: keyvalue
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true

databases:
  - name: arche-template-db
    plan: free
    databaseName: template
    user: template
