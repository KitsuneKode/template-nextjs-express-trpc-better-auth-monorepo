# Render Blueprint — Docker API only (Path B)
# Postgres + Redis: external Neon + Upstash (paste DATABASE_URL / REDIS_URL)
# Dashboard → Blueprints → New Blueprint Instance → connect repo
# Web stays on Vercel (NEXT_PUBLIC_API_URL → arche-template-api URL)
# See docs/deployment-render.md

services:
  - type: web
    name: arche-template-api
    runtime: docker
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RENDER
        value: 'true'
      - key: DATABASE_URL
        sync: false
      - key: ENABLE_REDIS
        value: 'false'
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
